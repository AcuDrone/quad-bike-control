; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c6-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

; Library dependencies
lib_deps =
    bolderflight/Bolder Flight Systems SBUS@^8.1.4
    mathieucarbou/ESPAsyncWebServer@^3.4.6
    bblanchon/ArduinoJson@^6.21.3
    DNSServer
    https://github.com/coryjfowler/MCP_CAN_lib.git

; Filesystem configuration (SPIFFS for web portal)
board_build.filesystem = spiffs

; Use 8MB OTA partition scheme (2 x 3.2MB app partitions + 1.5MB SPIFFS)
; This enables proper OTA updates with dual partitions for your 8MB flash
board_build.partitions = default_8MB.csv

; Monitor settings for debugging
monitor_speed = 115200
