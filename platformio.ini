; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; ─── Global defaults (inherited by all environments) ─────────────────────────
[env]
lib_deps =
    bolderflight/Bolder Flight Systems SBUS@^8.1.4
    mathieucarbou/ESPAsyncWebServer@^3.4.6
    bblanchon/ArduinoJson@^6.21.3
    DNSServer
    https://github.com/coryjfowler/MCP_CAN_lib.git
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2

lib_ignore = AsyncTCP_RP2040W

platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino

board_build.filesystem = littlefs

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; ─── ESP32-S3-DevKitC-1 N16R8 (16 MB flash, 8 MB OPI PSRAM) ─────────────────
[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1

board_build.partitions = partitions_16mb.csv
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi  ; quad flash + octal PSRAM (R8)
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

upload_flags =
    --before=default_reset
    --after=hard_reset
    --chip=esp32s3

